<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · Ephemeral</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="bg-canvas">
    <div class="bg-orb bg-orb-1" style="background:radial-gradient(circle,#ffab40,transparent);top:-100px;right:-100px;left:auto;"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>
  <div id="toastContainer" class="toast-container"></div>

  <div class="page">
    <div class="card" style="max-width:420px;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="width:56px;height:56px;background:linear-gradient(135deg,#ffab40,#ff6d00);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;box-shadow:0 4px 20px rgba(255,171,64,0.35);">🛡</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,171,64,0.1);border:1px solid rgba(255,171,64,0.3);border-radius:100px;padding:4px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#ffab40;margin-bottom:14px;">
          Admin Access
        </div>
        <h1 class="page-title" style="font-size:28px;">Admin <span style="background:linear-gradient(135deg,#ffab40,#ff6d00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Portal</span></h1>
        <p class="page-subtitle" style="font-size:14px;">Secure administrative dashboard. Authorized personnel only.</p>
      </div>

      <div class="form-group">
        <label class="form-label">Admin Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="adminUser" class="form-input" placeholder="admin" autofocus autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="adminPass" class="form-input" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePwd()">👁️</button>
        </div>
      </div>

      <div id="errorMsg" class="error-text" style="display:none;margin-bottom:16px;"></div>

      <button onclick="adminLogin()" class="btn" id="loginBtn" style="background:linear-gradient(135deg,#ffab40,#ff6d00);color:#000;font-weight:700;box-shadow:0 4px 24px rgba(255,171,64,0.35);">
        🔐 Login to Dashboard
      </button>

      <div style="margin-top:20px;padding:14px;background:rgba(255,171,64,0.05);border:1px solid rgba(255,171,64,0.1);border-radius:var(--radius-md);font-size:12px;color:var(--text-secondary);text-align:center;line-height:1.7;">
        ⚠ All admin actions are logged in the audit trail for transparency.
      </div>

      <p class="text-muted text-center" style="margin-top:16px;font-size:13px;">
        <a href="../index.html" class="link">← Back to App</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (localStorage.getItem('adminToken')) window.location.href = 'admin-dashboard.html';

    function togglePwd() {
      const el = document.getElementById('adminPass');
      const btn = document.querySelector('.toggle-password');
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁️' : '🙈';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

    async function adminLogin() {
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      const username = document.getElementById('adminUser').value.trim();
      const password = document.getElementById('adminPass').value;

      if (!username || !password) { errEl.style.display='flex'; errEl.textContent='⚠ Enter username and password.'; return; }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="border-top-color:#000;"></div> Authenticating...';
      errEl.style.display = 'none';

      try {
        const data = await apiCall('/api/admin/login', { method:'POST', body: JSON.stringify({ username, password }) });
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminUsername', data.username);
        localStorage.setItem('adminRole', data.role);
        showToast('Welcome, ' + data.username + '!', 'success');
        setTimeout(() => window.location.href = 'admin-dashboard.html', 500);
      } catch(err) {
        errEl.style.display = 'flex';
        errEl.textContent = '⚠ ' + (err.message || 'Authentication failed.');
        btn.disabled = false;
        btn.innerHTML = '🔐 Login to Dashboard';
      }
    }
  </script>
</body>
</html>
